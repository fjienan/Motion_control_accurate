motion_action_node:
  ros__parameters:
    # Topics and loop timing
    relocation_topic: /odin1/relocation
    velocity_topic: /t0x0101_pid
    control_frequency_hz: 20.0
    # Full action feedback in debug mode; lightweight feedback otherwise.
    feedback_frequency_hz: 20.0
    lightweight_feedback_frequency_hz: 5.0

    # Timeouts
    initial_pose_timeout_sec: 0.5
    pose_timeout_sec: 10.0

    # Brake behavior
    brake_duration_sec: 0.3
    brake_frequency_hz: 50.0

    # Goal tolerances
    yaw_tolerance_deg: 1.0
    position_tolerance: 0.015

    # Shared PID integral clamp
    integral_limit: 0.5

    # Slow profile, selected by pid_profile=0
    slow_profile:
      max_linear_speed: 0.8
      max_yaw_angular_speed: 0.4
      min_linear_speed: 0.15
      min_yaw_angular_speed: 0.0
      along_pid:
        kp: 5.0
        ki: 0.01
        kd: 0.1
      cross_pid:
        kp: 5.0
        ki: 0.01
        kd: 0.1
      yaw_pid:
        kp: 1.0
        ki: 0.0
        kd: 0.0

    # Fast profile, selected by pid_profile=1
    fast_profile:
      max_linear_speed: 2.0
      max_yaw_angular_speed: 0.4
      min_linear_speed: 0.15
      min_yaw_angular_speed: 0.0
      along_pid:
        kp: 5.0
        ki: 0.01
        kd: 0.1
      cross_pid:
        kp: 5.0
        ki: 0.01
        kd: 0.1
      yaw_pid:
        kp: 1.0
        ki: 0.0
        kd: 0.0

    # Debug plot output and full feedback mode
    enable_debug_plot_files: false
    debug_output_dir: output/pid_debug
