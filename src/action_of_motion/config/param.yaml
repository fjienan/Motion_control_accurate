motion_action_node:
  ros__parameters:
    relocation_topic: /odin1/relocation
    velocity_topic: /t0x0101_pid
    control_frequency_hz: 20.0
    initial_pose_timeout_sec: 2.0
    yaw_timeout_sec: 10.0
    xy_timeout_sec: 10.0
    brake_duration_sec: 0.3
    brake_frequency_hz: 50.0
    enable_debug_plot_files: true
    debug_output_dir: output/pid_debug

    yaw_tolerance_deg: 1.0
    position_tolerance: 0.015

    max_linear_speed: 1.5
    max_yaw_angular_speed: 1.5
    max_xy_yaw_angular_speed: 0.4
    min_linear_speed: 0.15
    min_yaw_angular_speed: 0.2
    min_xy_yaw_angular_speed: 0.0
    integral_limit: 0.5

    yaw_pid:
      kp: 1.5
      ki: 0.2
      kd: 0.05
    xy_yaw_pid:
      kp: 1.0
      ki: 0.0
      kd: 0.0
    x_pid:
      kp: 5.0
      ki: 0.01
      kd: 0.1
    y_pid:
      kp: 5.0
      ki: 0.01
      kd: 0.1
